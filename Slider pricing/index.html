<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="value-card">
      <div class="value-card__header">
        <h3 class="value-card__title">Purchase now</h3>
      </div>
      <div class="value-card__body">
        <div class="value-card__pricing">
          <span class="value-card__price">99.99</span>
          <span class="value-card__unit value-card__unit--currency">USD/person</span>
        </div>
        <div class="value-card__saving">
          <span class="value-card__saving-text">The discount is up to</span>
          <span class="value-card__saving-value">10</span>
          <span class="value-card__unit value-card__unit--percent">%</span>
        </div>
        <div class="value-card__slider">
          <span class="value-card__slider--icon">
            <svg fill="#000000" width="40px" height="40px" viewBox="-3 0 19 19" xmlns="http://www.w3.org/2000/svg" class="cf-icon-svg"><path d="M12.517 12.834v1.9a1.27 1.27 0 0 1-1.267 1.267h-9.5a1.27 1.27 0 0 1-1.267-1.267v-1.9A3.176 3.176 0 0 1 3.65 9.667h5.7a3.176 3.176 0 0 1 3.167 3.167zM3.264 5.48A3.236 3.236 0 1 1 6.5 8.717a3.236 3.236 0 0 1-3.236-3.236z"/></svg>
          </span>
          <div class="value-card__track">
            <input class="value-card__slider--slider" type="range" id="slider" min="1" max="20" value="1">
            <div class="value-card__slider--tooltip">40</div>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
